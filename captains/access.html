<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Captains Area — Notts Masters Badminton</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    body { font-family: Arial, sans-serif; background:#f5f5f5; padding:40px; }
    h1 { text-align:center; }
    .box {
      max-width:600px;
      margin:auto;
      padding:20px;
      background:#fff;
      border-radius:8px;
      box-shadow:0 2px 6px rgba(0,0,0,0.2);
      text-align:center;
    }
    button {
      display:block;
      width:100%;
      padding:12px;
      margin:10px 0;
      font-size:16px;
      border:none;
      border-radius:6px;
      cursor:pointer;
      background:#0066cc;
      color:white;
    }
    button:hover { background:#004c99; }
    .logout { background:#cc0000; }
    .logout:hover { background:#990000; }
  </style>
</head>

<body>

  <h1>Captains Area</h1>
  <p style="text-align:center;">Welcome to the secure Captains Area. Use the buttons below to access resources.</p>

  <div class="box">
    <button onclick="location.href='/Home/captains/fixtures.html'">Fixtures</button>
    <button onclick="location.href='/Home/captains/teams.html'">Teams</button>
    <button onclick="location.href='/Home/captains/resources.html'">Resources</button>
    <button class="logout" onclick="logout()">Logout</button>
  </div>

  <script>
    // Redirect to login if no session exists
    const session = JSON.parse(localStorage.getItem("clubSession") || "{}");

    if (!session.loggedIn) {
      window.location.href = "/Home/captains-login.html";
    }

    function logout() {
      localStorage.removeItem("clubSession");
      window.location.href = "/Home/captains-login.html";
    }
  </script>

</body>
</html>
